<!DOCTYPE html>
<html>
  <head>
    <title>Voyaverse - Real World Training</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <script>
      // Custom A-Frame component for interactive learning modules
      AFRAME.registerComponent('learning-module', {
        schema: {
          word: {type: 'string', default: ''},
          pronunciation: {type: 'string', default: ''},
          translation: {type: 'string', default: ''},
          cultureFact: {type: 'string', default: ''},
          color: {type: 'string', default: '#FFF'}
        },
        init: function () {
          let el = this.el;
          let data = this.data;
          let originalColor = el.getAttribute('color');

          let uiWord = document.querySelector('#ui-word');
          let uiTranslation = document.querySelector('#ui-translation');
          let uiFact = document.querySelector('#ui-fact');

          el.addEventListener('mouseenter', function () {
            el.setAttribute('scale', '1.2 1.2 1.2');
            el.setAttribute('color', data.color);

            uiWord.setAttribute('value', `${data.word} (${data.pronunciation})`);
            uiTranslation.setAttribute('value', `Translation: ${data.translation}`);
            uiFact.setAttribute('value', data.cultureFact);
          });

          el.addEventListener('mouseleave', function () {
            el.setAttribute('scale', '1 1 1');
            el.setAttribute('color', originalColor);
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      
      <a-assets>
        <img id="real-location" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/city.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#real-location"></a-sky>

      <a-entity position="0 1.6 0">
        <a-camera>
          <a-cursor color="#FFCC00" fuse="true" timeout="500"></a-cursor>
        </a-camera>
      </a-entity>

      <a-entity position="0 2.5 -4" geometry="primitive: plane; width: 4; height: 2" material="color: #222; opacity: 0.8">
        <a-text value="Welcome to Voyaverse: Real World" position="0 0.7 0.01" align="center" color="#FFCC00" width="6"></a-text>
        <a-text value="Look at the markers to learn about this place!" position="0 0.4 0.01" align="center" color="#FFF" width="4"></a-text>
        
        <a-text id="ui-word" value="" position="0 0 0.01" align="center" color="#00FFCC" width="5"></a-text>
        <a-text id="ui-translation" value="" position="0 -0.3 0.01" align="center" color="#FFF" width="4"></a-text>
        <a-text id="ui-fact" value="" position="0 -0.7 0.01" align="center" color="#FFAA55" width="4" wrap-count="35"></a-text>
      </a-entity>

      <a-box position="-3 1 -3" rotation="0 45 0" color="#2E8B57" opacity="0.8"
             learning-module="word: Konnichiwa; 
                              pronunciation: kon-nee-chee-wah; 
                              translation: Hello / Good Afternoon; 
                              cultureFact: Used mostly during the day. A slight bow while saying this shows great respect.;
                              color: #00FF00">
        <a-text value="Language" position="0 0.6 0" align="center" color="#FFF" side="double"></a-text>
      </a-box>

      <a-cylinder position="0 1 -3" radius="0.5" height="1" color="#8B0000" opacity="0.8"
                  learning-module="word: Sado; 
                                   pronunciation: sah-doh; 
                                   translation: The Way of Tea; 
                                   cultureFact: Japanese tea ceremonies are a choreographic ritual of preparing and serving Matcha. It represents harmony, respect, purity, and tranquility.;
                                   color: #FF0000">
        <a-text value="Tradition" position="0 0.8 0" align="center" color="#FFF" side="double"></a-text>
      </a-cylinder>

      <a-sphere position="3 1 -3" radius="0.6" color="#4169E1" opacity="0.8"
                learning-module="word: Ojigi; 
                                 pronunciation: oh-jee-gee; 
                                 translation: Bowing; 
                                 cultureFact: Bowing is crucial in Japan. A 15-degree bow is for casual greetings, 30-degrees for respect, and 45-degrees for deep apologies or deep gratitude.;
                                 color: #0000FF">
        <a-text value="Etiquette" position="0 0.8 0" align="center" color="#FFF" side="double"></a-text>
      </a-sphere>

    </a-scene>
  </body>
</html>
