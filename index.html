<!DOCTYPE html>
<html>
  <head>
    <title>Voyaverse Quick-Start</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#121212"></a-sky>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor color="white"></a-cursor>
      </a-entity>

      <a-text id="main-text" value="VOYAVERSE: Look at a cube to learn." position="0 1.6 -2" align="center" width="3"></a-text>

      <a-box position="0 1 -2" rotation="0 45 0" color="#4CC3D9"
             event-set__enter="_event: mouseenter; color: #FFCC00; scale: 1.2 1.2 1.2"
             event-set__leave="_event: mouseleave; color: #4CC3D9; scale: 1 1 1"
             onclick="document.getElementById('main-text').setAttribute('value', 'JAPAN: Konnichiwa means Hello!')">
      </a-box>

      <a-text value="Gaze here to learn" position="0 0.5 -2" align="center"></a-text>

    </a-scene>
  </body>
</html>
